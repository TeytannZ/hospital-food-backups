name: Frequent Data Backup

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BACKUP_TOKEN }}
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Login and export data
        env:
          APP_URL: ${{ secrets.APP_URL }}
          BACKUP_USER: ${{ secrets.BACKUP_USER }}
          BACKUP_PASS: ${{ secrets.BACKUP_PASS }}
        run: |
          APP_URL="${APP_URL%/}"

          LOGIN=$(curl -s -X POST "${APP_URL}/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${BACKUP_USER}\",\"password\":\"${BACKUP_PASS}\"}")

          if ! echo "$LOGIN" | jq . > /dev/null 2>&1; then
            echo "ERROR: Login endpoint did not return valid JSON."
            exit 1
          fi

          TOKEN=$(echo "$LOGIN" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "Login failed — no token found. Response: $LOGIN"
            exit 1
          fi

          TIMESTAMP=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          BACKUP_DIR="backups/${TIMESTAMP}"
          mkdir -p "$BACKUP_DIR"

          # Records WITH food items embedded (needed for full restore)
          curl -sf -H "Authorization: Bearer $TOKEN" \
            "${APP_URL}/api/records?include_foods=1" \
            -o "$BACKUP_DIR/records_list.json"

          # Users — fetch full then strip password_hash before committing
          # (public repo safe: no hashes, no IPs exposed)
          curl -sf -H "Authorization: Bearer $TOKEN" \
            "${APP_URL}/api/users/export" \
            -o /tmp/users_full.json || echo '{"users":[]}' > /tmp/users_full.json

          jq '{users: [.users[] | {id,username,full_name,role,active,created_at}]}' \
            /tmp/users_full.json > "$BACKUP_DIR/users.json"

          # Food catalog
          curl -sf -H "Authorization: Bearer $TOKEN" \
            "${APP_URL}/api/users/catalog" \
            -o "$BACKUP_DIR/catalog.json"

          # Audit log — strip IP addresses before committing
          curl -sf -H "Authorization: Bearer $TOKEN" \
            "${APP_URL}/api/users/audit/export" \
            -o /tmp/audit_raw.json || echo '{"logs":[]}' > /tmp/audit_raw.json

          jq '{logs: [.logs[] | del(.ip_address)], exported_at: .exported_at}' \
            /tmp/audit_raw.json > "$BACKUP_DIR/audit_logs.json"

          RECORD_COUNT=$(jq '.records | length' "$BACKUP_DIR/records_list.json" 2>/dev/null || echo "0")
          USER_COUNT=$(jq '.users | length' "$BACKUP_DIR/users.json" 2>/dev/null || echo "0")
          echo "Records: $RECORD_COUNT | Users: $USER_COUNT"

          echo "{
            \"backed_up_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            \"source\": \"${APP_URL}\",
            \"record_count\": $RECORD_COUNT,
            \"user_count\": $USER_COUNT,
            \"status\": \"$([ "$RECORD_COUNT" -gt 0 ] && echo ok || echo empty)\"
          }" > "$BACKUP_DIR/metadata.json"

          # Data loss detection — check last 96 folders (24h at 15min)
          LAST_NONEMPTY=""
          LAST_NONEMPTY_COUNT=0
          if [ -d "backups" ]; then
            for dir in $(ls -1 backups/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}T' | sort -r | head -96); do
              META="backups/$dir/metadata.json"
              if [ ! -f "$META" ]; then continue; fi
              RC=$(jq '.record_count // 0' "$META" 2>/dev/null || echo "0")
              if [ "$RC" -gt 0 ]; then
                LAST_NONEMPTY="$dir"
                LAST_NONEMPTY_COUNT="$RC"
                break
              fi
            done
          fi

          if [ "$RECORD_COUNT" -eq 0 ] && [ -n "$LAST_NONEMPTY" ]; then
            echo "⚠️ DATA LOSS DETECTED — last good: $LAST_NONEMPTY ($LAST_NONEMPTY_COUNT records)"

            LOSS_FILE="DATA_LOSS_EVENTS.md"
            [ ! -f "$LOSS_FILE" ] && printf "# Data Loss Events\n\n" > "$LOSS_FILE"
            printf "## ⚠️ %s\n- Last good backup: \`%s\` (%s records)\n- Empty detected: \`%s\`\n\n" \
              "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$LAST_NONEMPTY" "$LAST_NONEMPTY_COUNT" "$TIMESTAMP" >> "$LOSS_FILE"

            echo "DATA_LOSS=true" >> "$GITHUB_ENV"
            echo "LAST_NONEMPTY=${LAST_NONEMPTY}" >> "$GITHUB_ENV"
            echo "LAST_NONEMPTY_COUNT=${LAST_NONEMPTY_COUNT}" >> "$GITHUB_ENV"
            echo "LOSS_TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          else
            echo "✅ Backup healthy."
          fi

      - name: Open GitHub Issue on data loss
        if: env.DATA_LOSS == 'true'
        env:
          GH_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "⚠️ DATA LOSS — $(date -u +%Y-%m-%d %H:%M UTC)" \
            --body "Database was empty after previously having **${LAST_NONEMPTY_COUNT} records**.

          **Last good backup:** \`${LAST_NONEMPTY}\`
          **Loss window:** between \`${LAST_NONEMPTY}\` and \`${LOSS_TIMESTAMP}\`

          The server should auto-restore on next startup. Check Render logs for '📥 Restoring from backup'." || true

      - name: Remove empty backup folders
        run: |
          if [ -d "backups" ]; then
            ALL_DIRS=$(ls -1 backups/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}T' | sort)
            TOTAL=$(echo "$ALL_DIRS" | grep -c . 2>/dev/null || echo 0)
            IDX=0
            for dir in $ALL_DIRS; do
              IDX=$((IDX+1))
              [ "$IDX" -eq "$TOTAL" ] && continue  # always keep most recent
              META="backups/$dir/metadata.json"
              if [ -f "$META" ]; then
                RC=$(jq '.record_count // 1' "$META" 2>/dev/null || echo "1")
                [ "$RC" -eq 0 ] && rm -rf "backups/$dir" && echo "Removed empty: $dir"
              fi
            done
          fi

      - name: Keep last 30 days (max 2880 folders at 15min)
        run: |
          KEEP=2880
          if [ -d "backups" ]; then
            COUNT=$(ls -1 backups/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}T' | wc -l)
            if [ "$COUNT" -gt "$KEEP" ]; then
              ls -1 backups/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}T' | sort | head -n $(($COUNT - $KEEP)) | \
                while read d; do rm -rf "backups/$d"; done
            fi
            echo "Backups kept: $(ls -1 backups/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}T' | wc -l) / $KEEP"
          fi

      - name: Commit and push
        run: |
          git config user.name "Backup Bot"
          git config user.email "backup@noreply.github.com"
          git add backups/ DATA_LOSS_EVENTS.md 2>/dev/null || git add backups/
          git diff --cached --quiet || (git commit -m "Backup $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
