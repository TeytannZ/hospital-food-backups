name: Nightly Data Backup

on:
  schedule:
    - cron: '0 2 * * *'   # Every night at 02:00 UTC
  workflow_dispatch:         # Also run manually from GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BACKUP_TOKEN }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Login and export data
        env:
          APP_URL: ${{ secrets.APP_URL }}
          BACKUP_USER: ${{ secrets.BACKUP_USER }}
          BACKUP_PASS: ${{ secrets.BACKUP_PASS }}
        run: |
          LOGIN=$(curl -s -X POST "${APP_URL}/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${BACKUP_USER}\",\"password\":\"${BACKUP_PASS}\"}")

          TOKEN=$(echo "$LOGIN" | jq -r '.token // empty')

          if [ -z "$TOKEN" ]; then
            echo "Login failed. Response: $LOGIN"
            echo "Check APP_URL, BACKUP_USER, BACKUP_PASS secrets."
            exit 1
          fi

          DATE=$(date +%Y-%m-%d)
          BACKUP_DIR="backups/$DATE"
          mkdir -p "$BACKUP_DIR"

          curl -sf -H "Authorization: Bearer $TOKEN" \
            "${APP_URL}/api/records" -o "$BACKUP_DIR/records_list.json"

          curl -sf -H "Authorization: Bearer $TOKEN" \
            "${APP_URL}/api/users/catalog" -o "$BACKUP_DIR/catalog.json"

          curl -sf -H "Authorization: Bearer $TOKEN" \
            "${APP_URL}/api/users/audit/export" -o "$BACKUP_DIR/audit_logs.json" || true

          echo "{\"backed_up_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"source\":\"${APP_URL}\"}" \
            > "$BACKUP_DIR/metadata.json"

      - name: Commit and push
        run: |
          git config user.name "Backup Bot"
          git config user.email "backup@noreply.github.com"
          git add backups/
          git diff --cached --quiet || (git commit -m "Auto-backup $(date +%Y-%m-%d)" && git push)
